services:
  - type: web
    name: nexus-ecommerce-backend
    env: node
    rootDir: ecommerce-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: ecommerce
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URLS
        value: https://nexus-ecommerce-frontend.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_NAME
        value: Dinesh
      - key: ADMIN_EMAIL
        value: dinesh@admin.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PHONE
        value: "9999999999"

  - type: static
    name: nexus-ecommerce-frontend
    rootDir: cd ecommerce-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://nexus-ecommerce-backend.onrender.com/api
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
